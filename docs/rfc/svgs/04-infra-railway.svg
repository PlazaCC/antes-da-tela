<svg width="800" viewBox="0 0 800 260" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Arquitetura de deploy — Opção C (Railway)</title>
  <desc>Fluxo: GitHub push para Railway deploy nos EUA, usuário brasileiro acessa com latência adicional de ~150ms, app chama Supabase</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, system-ui, sans-serif; }
      .box-title { font-size: 13px; font-weight: 700; }
      .box-sub   { font-size: 11px; }
      .edge-label{ font-size: 10px; fill: #888780; }
      .warn      { font-size: 10px; fill: #791F1F; font-weight: 600; }
    </style>
  </defs>

  <rect width="800" height="260" fill="#ffffff" rx="12"/>

  <!-- GitHub -->
  <rect x="24" y="100" width="120" height="60" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="84" y="126" text-anchor="middle" class="box-title" fill="#2C2C2A">GitHub</text>
  <text x="84" y="144" text-anchor="middle" class="box-sub" fill="#5F5E5A">repositório</text>

  <line x1="144" y1="130" x2="208" y2="130" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
  <text x="176" y="120" text-anchor="middle" class="edge-label">push</text>

  <!-- Railway -->
  <rect x="208" y="70" width="180" height="120" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1"/>
  <text x="298" y="106" text-anchor="middle" class="box-title" fill="#412402">Railway</text>
  <text x="298" y="124" text-anchor="middle" class="box-sub" fill="#633806">Next.js</text>
  <text x="298" y="140" text-anchor="middle" class="box-sub" fill="#633806">região: US East</text>
  <text x="298" y="156" text-anchor="middle" class="box-sub" fill="#633806">deploy automático</text>
  <text x="298" y="172" text-anchor="middle" class="box-sub" fill="#633806">sem timeout</text>

  <!-- Usuário -->
  <rect x="24" y="196" width="120" height="44" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="84" y="216" text-anchor="middle" class="box-title" fill="#2C2C2A">Usuário BR</text>
  <text x="84" y="232" text-anchor="middle" class="box-sub" fill="#5F5E5A">browser</text>

  <!-- latency warning arrow -->
  <line x1="144" y1="218" x2="208" y2="178" stroke="#E24B4A" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <text x="120" y="245" class="warn">~150ms extra</text>
  <text x="120" y="258" class="warn">(sem região BR)</text>

  <!-- Supabase -->
  <rect x="436" y="80" width="148" height="100" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="510" y="114" text-anchor="middle" class="box-title" fill="#04342C">Supabase</text>
  <text x="510" y="132" text-anchor="middle" class="box-sub" fill="#085041">Postgres</text>
  <text x="510" y="148" text-anchor="middle" class="box-sub" fill="#085041">Auth · Storage</text>
  <text x="510" y="164" text-anchor="middle" class="box-sub" fill="#085041">Realtime</text>

  <line x1="388" y1="130" x2="436" y2="130" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Cloudflare -->
  <rect x="628" y="80" width="148" height="100" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="702" y="114" text-anchor="middle" class="box-title" fill="#412402">Cloudflare</text>
  <text x="702" y="132" text-anchor="middle" class="box-sub" fill="#633806">CDN</text>
  <text x="702" y="148" text-anchor="middle" class="box-sub" fill="#633806">cache PDFs</text>

  <line x1="584" y1="130" x2="628" y2="130" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- custo badge -->
  <rect x="208" y="202" width="180" height="24" rx="4" fill="#FAC775"/>
  <text x="298" y="218" text-anchor="middle" style="font-size:11px;font-weight:700;fill:#412402;font-family:ui-sans-serif,system-ui,sans-serif;">~R$ 28/mês · sem região BR</text>
</svg>
