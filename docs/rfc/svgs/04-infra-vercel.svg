<svg width="800" viewBox="0 0 800 260" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Arquitetura de deploy — Opção A (Vercel)</title>
  <desc>Fluxo: GitHub push para Vercel deploy, usuário acessa via Cloudflare CDN, Next.js chama Supabase</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, system-ui, sans-serif; }
      .box-title { font-size: 13px; font-weight: 700; }
      .box-sub   { font-size: 11px; }
      .edge-label{ font-size: 10px; fill: #888780; }
    </style>
  </defs>

  <rect width="800" height="260" fill="#ffffff" rx="12"/>

  <!-- GitHub -->
  <rect x="24" y="100" width="120" height="60" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="84" y="126" text-anchor="middle" class="box-title" fill="#2C2C2A">GitHub</text>
  <text x="84" y="144" text-anchor="middle" class="box-sub" fill="#5F5E5A">repositório</text>

  <!-- arrow: GitHub → Vercel -->
  <line x1="144" y1="130" x2="208" y2="130" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
  <text x="176" y="122" text-anchor="middle" class="edge-label">push / PR</text>

  <!-- Vercel -->
  <rect x="208" y="80" width="160" height="100" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="1"/>
  <text x="288" y="116" text-anchor="middle" class="box-title" fill="#04342C">Vercel</text>
  <text x="288" y="134" text-anchor="middle" class="box-sub" fill="#085041">Next.js 14</text>
  <text x="288" y="150" text-anchor="middle" class="box-sub" fill="#085041">Edge Network global</text>
  <text x="288" y="166" text-anchor="middle" class="box-sub" fill="#085041">CI/CD automático</text>

  <!-- arrow: Usuário → Cloudflare -->
  <rect x="24" y="200" width="120" height="44" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="84" y="220" text-anchor="middle" class="box-title" fill="#2C2C2A">Usuário BR</text>
  <text x="84" y="236" text-anchor="middle" class="box-sub" fill="#5F5E5A">browser</text>

  <line x1="144" y1="222" x2="208" y2="180" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
  <text x="172" y="212" text-anchor="middle" class="edge-label">HTTPS</text>

  <!-- arrow: Vercel → Supabase -->
  <line x1="368" y1="130" x2="432" y2="130" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
  <text x="400" y="122" text-anchor="middle" class="edge-label">server / API</text>

  <!-- Supabase -->
  <rect x="432" y="80" width="160" height="100" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="512" y="116" text-anchor="middle" class="box-title" fill="#04342C">Supabase</text>
  <text x="512" y="134" text-anchor="middle" class="box-sub" fill="#085041">Postgres</text>
  <text x="512" y="150" text-anchor="middle" class="box-sub" fill="#085041">Auth · Storage</text>
  <text x="512" y="166" text-anchor="middle" class="box-sub" fill="#085041">Realtime</text>

  <!-- arrow: Supabase → Cloudflare CDN -->
  <line x1="592" y1="130" x2="632" y2="130" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Cloudflare CDN -->
  <rect x="632" y="80" width="144" height="100" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="704" y="116" text-anchor="middle" class="box-title" fill="#412402">Cloudflare</text>
  <text x="704" y="134" text-anchor="middle" class="box-sub" fill="#633806">CDN</text>
  <text x="704" y="150" text-anchor="middle" class="box-sub" fill="#633806">cache PDFs</text>
  <text x="704" y="166" text-anchor="middle" class="box-sub" fill="#633806">proxy DNS</text>

  <!-- arrow: CDN → Usuário -->
  <line x1="704" y1="180" x2="144" y2="222" stroke="#EF9F27" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <text x="430" y="218" text-anchor="middle" class="edge-label">PDFs cacheados</text>

  <!-- label custo -->
  <rect x="208" y="192" width="160" height="24" rx="4" fill="#9FE1CB"/>
  <text x="288" y="208" text-anchor="middle" style="font-size:11px;font-weight:700;fill:#04342C;font-family:ui-sans-serif,system-ui,sans-serif;">R$ 0/mês na POC</text>
</svg>
