<svg width="800" viewBox="0 0 800 260" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Arquitetura de deploy — Opção B (Fly.io)</title>
  <desc>Fluxo: GitHub Actions builda Docker image, faz deploy no Fly.io região São Paulo, usuário acessa via Cloudflare, app chama Supabase</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, system-ui, sans-serif; }
      .box-title { font-size: 13px; font-weight: 700; }
      .box-sub   { font-size: 11px; }
      .edge-label{ font-size: 10px; fill: #888780; }
    </style>
  </defs>

  <rect width="800" height="260" fill="#ffffff" rx="12"/>

  <!-- GitHub + Actions -->
  <rect x="24" y="90" width="140" height="80" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="94" y="122" text-anchor="middle" class="box-title" fill="#2C2C2A">GitHub</text>
  <text x="94" y="140" text-anchor="middle" class="box-sub" fill="#5F5E5A">+ Actions</text>
  <text x="94" y="156" text-anchor="middle" class="box-sub" fill="#5F5E5A">build Docker</text>

  <!-- arrow GitHub → Fly -->
  <line x1="164" y1="130" x2="228" y2="130" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
  <text x="196" y="120" text-anchor="middle" class="edge-label">flyctl deploy</text>

  <!-- Fly.io -->
  <rect x="228" y="70" width="180" height="120" rx="8" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="1"/>
  <text x="318" y="106" text-anchor="middle" class="box-title" fill="#26215C">Fly.io</text>
  <text x="318" y="124" text-anchor="middle" class="box-sub" fill="#534AB7">Next.js (Docker)</text>
  <text x="318" y="140" text-anchor="middle" class="box-sub" fill="#534AB7">região: gru (São Paulo)</text>
  <text x="318" y="156" text-anchor="middle" class="box-sub" fill="#534AB7">shared-cpu-1x · 256 MB</text>
  <text x="318" y="172" text-anchor="middle" class="box-sub" fill="#534AB7">sem timeout</text>

  <!-- Usuário -->
  <rect x="24" y="196" width="120" height="44" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="84" y="216" text-anchor="middle" class="box-title" fill="#2C2C2A">Usuário BR</text>
  <text x="84" y="232" text-anchor="middle" class="box-sub" fill="#5F5E5A">browser</text>

  <line x1="144" y1="218" x2="228" y2="178" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
  <text x="182" y="208" text-anchor="middle" class="edge-label">HTTPS direto</text>

  <!-- arrow Fly → Supabase -->
  <line x1="408" y1="130" x2="468" y2="130" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Supabase -->
  <rect x="468" y="80" width="148" height="100" rx="8" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.5"/>
  <text x="542" y="114" text-anchor="middle" class="box-title" fill="#04342C">Supabase</text>
  <text x="542" y="132" text-anchor="middle" class="box-sub" fill="#085041">Postgres</text>
  <text x="542" y="148" text-anchor="middle" class="box-sub" fill="#085041">Auth · Storage</text>
  <text x="542" y="164" text-anchor="middle" class="box-sub" fill="#085041">Realtime</text>

  <!-- Cloudflare CDN -->
  <rect x="648" y="80" width="128" height="100" rx="8" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="712" y="114" text-anchor="middle" class="box-title" fill="#412402">Cloudflare</text>
  <text x="712" y="132" text-anchor="middle" class="box-sub" fill="#633806">CDN</text>
  <text x="712" y="148" text-anchor="middle" class="box-sub" fill="#633806">cache PDFs</text>

  <line x1="616" y1="130" x2="648" y2="130" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- custo badge -->
  <rect x="228" y="202" width="180" height="24" rx="4" fill="#CECBF6"/>
  <text x="318" y="218" text-anchor="middle" style="font-size:11px;font-weight:700;fill:#26215C;font-family:ui-sans-serif,system-ui,sans-serif;">R$ 0/mês · Docker necessário</text>
</svg>
