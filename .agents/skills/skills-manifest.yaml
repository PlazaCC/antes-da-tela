# Manifesto de Skills MCP — Indexação para IAs
# Este arquivo serve para indexação rápida de skills por agentes e IAs, sem depender de parsing dos SKILL.md.
# Atualize manualmente ao adicionar/remover skills.

skills:
  - name: adapter-aws-lambda
    description: Deploy tRPC on AWS Lambda with awsLambdaRequestHandler() for API Gateway v1/v2 and Lambda URLs.
    path: adapter-aws-lambda/SKILL.md
  - name: adapter-express
    description: Mount tRPC as Express middleware with createExpressMiddleware().
    path: adapter-express/SKILL.md
  - name: adapter-fastify
    description: Mount tRPC as a Fastify plugin with fastifyTRPCPlugin.
    path: adapter-fastify/SKILL.md
  - name: adapter-fetch
    description: Deploy tRPC on edge runtimes with fetchRequestHandler().
    path: adapter-fetch/SKILL.md
  - name: adapter-standalone
    description: Mount tRPC on Node.js HTTP server with createHTTPServer().
    path: adapter-standalone/SKILL.md
  - name: add-dependency
    description: Adds a new npm package to the project using Yarn 4.
    path: add-dependency/SKILL.md
  - name: auth
    description: Implement JWT/cookie authentication and authorization in tRPC.
    path: auth/SKILL.md
  - name: caching
    description: Set HTTP cache headers on tRPC query responses.
    path: caching/SKILL.md
  - name: check-env
    description: Check and validate environment variables.
    path: check-env/SKILL.md
