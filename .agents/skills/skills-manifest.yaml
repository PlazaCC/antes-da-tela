    description: Throw typed errors with TRPCError and error codes.
    path: error-handling/SKILL.md
  - name: links
    description: Configure the tRPC client link chain.
    path: links/SKILL.md
  - name: middlewares
    description: Create and compose tRPC middleware.
    path: middlewares/SKILL.md
  - name: new-drizzle-table
    description: Creates a new Drizzle ORM table schema and generates the migration.
    path: new-drizzle-table/SKILL.md
  - name: new-page
    description: Scaffolds a new Next.js App Router page with proper Server Component patterns.
    path: new-page/SKILL.md
  - name: new-shadcn-component
    description: Installs a shadcn/ui component and creates a typed wrapper.
