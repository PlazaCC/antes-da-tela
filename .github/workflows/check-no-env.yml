name: Prevent .env commits

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  no-env-committed:
    name: Fail if .env is committed
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for committed .env
        run: |
          set -euo pipefail
          if git ls-files --error-unmatch .env > /dev/null 2>&1; then
            echo "ERROR: .env file is committed to the repository. Remove it from the index and rotate any exposed keys.";
            git ls-files --error-unmatch .env || true
            exit 1
          fi

      - name: Check for committed .env.* (optional)
        run: |
          set -euo pipefail
          for f in .env .env.*; do
            if git ls-files --error-unmatch "$f" > /dev/null 2>&1; then
              echo "ERROR: committed file detected: $f";
              git ls-files --error-unmatch "$f" || true
              exit 1
            fi
          done
