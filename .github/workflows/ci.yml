name: CI

on:
  # Run on PRs that target `main`, and on direct pushes to `main`.
  pull_request:
    branches: ['main']
  push:
    branches: ['main']

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Enable Corepack and prepare Yarn 4
        run: |
          corepack enable
          corepack prepare yarn@4.13.0 --activate

      - name: Yarn install
        run: yarn install --immutable

      - name: Typecheck
        run: yarn tsc -p tsconfig.json --noEmit

      - name: Lint
        run: yarn lint

      - name: Build
        run: yarn build

      - name: Run tests
        run: yarn test:run
